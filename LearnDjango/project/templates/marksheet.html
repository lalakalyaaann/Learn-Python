<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Marksheet</title>
</head>
<body>
    This is marksheet page.
    <form method ="post">
        {% csrf_token %}
        <label> MARKS in Subject1 </label>
        <input type="text" name="marks1"value ="{{marks1}}" class="form-control" />
         <label> MARKS in Subject2 </label>
        <input type="text" name="marks2"value ="{{marks2}}" class="form-control" />
         <label> MARKS in Subject3 </label>
        <input type="text" name="marks3"value ="{{marks3}}" class="form-control" />
         <label> MARKS in Subject4 </label>
        <input type="text" name="marks4" value ="{{marks4}}" class="form-control" />
         <label> MARKS in Subject5 </label>
        <input type="text" name="marks5" value ="{{marks5}}" class="form-control" />
        <button type="submit ">Submit </button> <br>
        
        <label> Total Marks </label>
        <input type ="text" value="{{total}}" class="form-control"/>
        <label> Percentage </label>
        <input type ="text" value="{{percent}}" class="form-control"/>
          <label> Division </label>
        <input type ="text" value="{{division}}" class="form-control"/>
    
    </form>
</body>
</html>
