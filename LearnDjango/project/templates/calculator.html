<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Calculator</title>
</head>
<body>
    This is calculator page.
    <form method="post">
        {% csrf_token %}
        <label>First Value </label>
        <input type="text" name ="num1" class="form-control" value="{{ n1 }}"/>
        <label>Select the operation</label>
        <select name ="opr" class = form-control>
            <option value = "+">+</option>
            <option value = "-">-</option>
            <option value = "*">*</option>
            <option value = "/">/</option>
        </select>
        <label>Second Value </label>
        <input type="text" name ="num2" class="form-control" value="{{ n2}}"/>
        <br>
        <button type="submit" >Calculate</button>
        <br>
        <label>Output</label>
        <input type ="text" value="{{c}}" class="form-control"/>
    </form>
</body>
</html>
